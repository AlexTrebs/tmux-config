# Custom AI entries for tmux_ai.sh
# Format: name:description:icon:color
# Fields:
#   name     - command or path to execute
#   desc    - shown in menu
#   icon    - emoji (optional, defaults to 🖥️)
#   color   - hex color without # (optional, defaults to green $A6E3A1)

# Example entries:
# ollama:Ollama:🧠:$YELLOW
# custom-ai:/home/user/bin/my-ai:🤖:$MAUVE